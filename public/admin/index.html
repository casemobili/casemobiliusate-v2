<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>CMU Admin · CaseMobiliUsate</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --primary: #2b3a24;
        --accent: #b89653;
      }
      body { font-family: 'Inter', system-ui, sans-serif; background: #faf7f0; }
      .nc-app-header { background-color: var(--primary) !important; }
    </style>
    <!-- Netlify Identity widget (gratuito, login email/password) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS UI viene iniettata qui -->
    <script src="https://unpkg.com/decap-cms@^3.6.4/dist/decap-cms.js"></script>
    <script>
      // Redirect post-login alla dashboard CMS
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', user => {
          if (!user) {
            window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
          }
        });
      }
    </script>
  </body>
</html>
